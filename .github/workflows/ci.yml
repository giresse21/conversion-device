name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  build-backend:
    name: Build Backend .NET
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./Conversion.API

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: ./Conversion.API

      - name: Test
        run: dotnet test --no-build -c Release
        working-directory: ./Conversion.API

  build-frontend:
    name: Build Frontend React
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./conversion-front/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ./conversion-front

      - name: Lint
        run: npm run lint
        working-directory: ./conversion-front

      - name: Build
        run: npm run build
        working-directory: ./conversion-front

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Docker image
        run: docker build -t conversion-api ./Conversion.API

      - name: Build Frontend Docker image
        run: docker build -t conversion-frontend ./conversion-front